version: '3.8'

services:
  api:
    build: .
    container_name: adv_ai_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app # Permite hot-reload ao editar o código localmente
    depends_on:
      - db
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Banco de dados local espelhando a Railway (Postgres com pgvector)
  db:
    image: ankane/pgvector:latest
    container_name: adv_ai_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: suasenha
      POSTGRES_DB: adv_ai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: